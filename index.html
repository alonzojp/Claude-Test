<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Translator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f14;
      color: #e8e6e1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #fff; }
    header h1 span { color: #e05252; }
    header p { margin-top: 8px; color: #888; font-size: 0.9rem; }

    .card {
      background: #18181f;
      border: 1px solid #2a2a36;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 760px;
    }

    .label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      background: #0f0f14;
      border: 1px solid #2a2a36;
      border-radius: 10px;
      color: #e8e6e1;
      font-size: 1.05rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: #e05252; }
    textarea::placeholder { color: #444; }

    .controls { display: flex; align-items: center; gap: 12px; margin-top: 16px; }

    #translateBtn {
      background: #e05252;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #translateBtn:hover { background: #c94444; }
    #translateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a36;
      border-radius: 8px;
      padding: 11px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clearBtn:hover { color: #aaa; border-color: #444; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #2a2a36;
      border-top-color: #e05252;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; width: 100%; max-width: 760px; margin-top: 20px; }

    .result-card {
      background: #18181f;
      border: 1px solid #2a2a36;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    #translationText {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #e8e6e1;
      white-space: pre-wrap;
    }
    #translationText.error { color: #e05252; }

    .copy-row { display: flex; justify-content: flex-end; margin-top: 12px; }
    #copyBtn {
      background: transparent;
      color: #666;
      border: 1px solid #2a2a36;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #copyBtn:hover { color: #aaa; border-color: #444; }
    #copyBtn.copied { color: #5cb85c; border-color: #5cb85c; }

    /* Word grid */
    #wordGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .word-card {
      background: #0f0f14;
      border: 1px solid #2a2a36;
      border-radius: 12px;
      padding: 14px 16px;
      flex: 1 1 130px;
      max-width: 210px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .word-card.loading { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:.75} }

    .wc-jp   { font-size: 1.35rem; font-weight: 700; color: #fff; }
    .wc-furi { font-size: 0.78rem; color: #e05252; }
    .wc-rom  { font-size: 0.78rem; color: #888; font-style: italic; }
    .wc-def  { font-size: 0.78rem; color: #aaa; line-height: 1.4; margin-top: 3px; }
    .wc-pos  { font-size: 0.68rem; color: #555; }

    .jlpt-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 2px;
      width: fit-content;
    }
    .jlpt-jlpt-n5 { background:#1a3d1a; color:#5cb85c; }
    .jlpt-jlpt-n4 { background:#1a3038; color:#5bc0de; }
    .jlpt-jlpt-n3 { background:#1a2a3d; color:#428bca; }
    .jlpt-jlpt-n2 { background:#2a1a3d; color:#9b59b6; }
    .jlpt-jlpt-n1 { background:#3d1a1a; color:#e05252; }

    footer { margin-top: 32px; color: #444; font-size: 0.78rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Japanese <span>Translator</span></h1>
  <p>Paste any Japanese text to translate and break down word by word.</p>
</header>

<div class="card">
  <div class="label">Japanese input</div>
  <textarea id="input" placeholder="日本語のテキストをここに貼り付けてください…" spellcheck="false"></textarea>
  <div class="controls">
    <button id="translateBtn" onclick="doTranslate()">Translate</button>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
    <div class="spinner" id="spinner"></div>
  </div>
</div>

<div id="results">
  <div class="result-card">
    <div class="label">English translation</div>
    <div id="translationText"></div>
    <div class="copy-row">
      <button id="copyBtn" onclick="copyTranslation()">Copy</button>
    </div>
  </div>

  <div class="result-card">
    <div class="label">Word breakdown</div>
    <div id="wordGrid"></div>
  </div>
</div>

<footer>Powered by MyMemory &amp; Jisho &mdash; free, no account needed</footer>

<script>
const inputEl  = document.getElementById('input');
const resultsEl = document.getElementById('results');
const transEl  = document.getElementById('translationText');
const gridEl   = document.getElementById('wordGrid');
const btn      = document.getElementById('translateBtn');
const spinEl   = document.getElementById('spinner');
const copyBtn  = document.getElementById('copyBtn');

inputEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doTranslate();
});

// ── Translation ──────────────────────────────────────────────────────────────

async function getTranslation(text) {
  // Primary: MyMemory (CORS-safe, designed for browser use)
  try {
    const url = 'https://api.mymemory.translated.net/get?q='
      + encodeURIComponent(text) + '&langpair=ja%7Cen';
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData.translatedText)
      return data.responseData.translatedText;
  } catch {}

  // Fallback: Google Translate unofficial endpoint
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q='
    + encodeURIComponent(text);
  const res = await fetch(url);
  const data = await res.json();
  const result = data[0].filter(Boolean).map(c => c[0]).join('');
  if (!result) throw new Error('No translation returned');
  return result;
}

// ── Word segmentation ────────────────────────────────────────────────────────

function segmentText(text) {
  // Use built-in Intl.Segmenter where available (Chrome 87+, Firefox 78+, Safari 14+)
  if ('Segmenter' in Intl) {
    const seg = new Intl.Segmenter('ja', { granularity: 'word' });
    return [...seg.segment(text)].filter(s => s.isWordLike).map(s => s.segment);
  }
  // Fallback: split on kanji/kana runs
  return text.match(/[぀-ヿ㐀-䶿一-鿿ｦ-ﾟ]+/g) || [];
}

// ── Jisho lookup (via CORS proxy) ────────────────────────────────────────────

async function lookupWord(word) {
  try {
    const target = 'https://jisho.org/api/v1/search/words?keyword=' + encodeURIComponent(word);
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(target));
    const data = await res.json();
    if (!data.data?.length) return null;
    const e = data.data[0];
    return {
      reading:    e.japanese?.[0]?.reading || null,
      jlpt:       e.jlpt?.[0] || null,
      definition: e.senses?.[0]?.english_definitions?.slice(0, 2).join(', ') || null,
      pos:        e.senses?.[0]?.parts_of_speech?.[0] || null,
    };
  } catch {
    return null;
  }
}

// ── Romaji converter (Hepburn) ───────────────────────────────────────────────

function toRomaji(reading) {
  if (!reading) return '';
  // Katakana → hiragana
  reading = reading.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));

  const combos = {
    'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho',
    'ちゃ':'cha','ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo',
    'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo',
    'りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
    'じゃ':'ja','じゅ':'ju','じょ':'jo','びゃ':'bya','びゅ':'byu','びょ':'byo',
    'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo','ふぁ':'fa','ふぃ':'fi','ふぇ':'fe','ふぉ':'fo',
  };
  const singles = {
    'あ':'a','い':'i','う':'u','え':'e','お':'o',
    'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
    'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
    'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
    'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
    'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
    'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
    'や':'ya','ゆ':'yu','よ':'yo',
    'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
    'わ':'wa','を':'wo','ん':'n',
    'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
    'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
    'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
    'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
    'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
    'ゃ':'ya','ゅ':'yu','ょ':'yo','ー':'-',
  };

  let result = '';
  let i = 0;
  while (i < reading.length) {
    if (reading[i] === 'っ') {
      const peek = combos[reading.slice(i+1, i+3)] || singles[reading[i+1]] || '';
      result += peek[0] || '';
      i++; continue;
    }
    const two = reading.slice(i, i+2);
    if (combos[two])        { result += combos[two]; i += 2; }
    else if (singles[reading[i]]) { result += singles[reading[i]]; i++; }
    else                    { result += reading[i]; i++; }
  }
  return result;
}

// ── Render ───────────────────────────────────────────────────────────────────

function makeCard(word, info, loading) {
  const card = document.createElement('div');
  card.className = 'word-card' + (loading ? ' loading' : '');

  const jp = document.createElement('div');
  jp.className = 'wc-jp';
  jp.textContent = word;
  card.appendChild(jp);

  if (info) {
    const reading = info.reading;
    const romaji  = toRomaji(reading);

    if (reading && reading !== word) {
      const el = document.createElement('div');
      el.className = 'wc-furi';
      el.textContent = reading;
      card.appendChild(el);
    }

    if (romaji && romaji !== word) {
      const el = document.createElement('div');
      el.className = 'wc-rom';
      el.textContent = romaji;
      card.appendChild(el);
    }

    if (info.jlpt) {
      const el = document.createElement('div');
      el.className = `jlpt-badge jlpt-${info.jlpt}`;
      el.textContent = info.jlpt.replace('jlpt-', '').toUpperCase();
      card.appendChild(el);
    }

    if (info.pos) {
      const el = document.createElement('div');
      el.className = 'wc-pos';
      el.textContent = info.pos;
      card.appendChild(el);
    }

    if (info.definition) {
      const el = document.createElement('div');
      el.className = 'wc-def';
      el.textContent = info.definition;
      card.appendChild(el);
    }
  }

  return card;
}

// ── Main ─────────────────────────────────────────────────────────────────────

async function doTranslate() {
  const text = inputEl.value.trim();
  if (!text) return;

  btn.disabled = true;
  spinEl.style.display = 'block';
  resultsEl.style.display = 'none';
  gridEl.innerHTML = '';
  transEl.textContent = '';
  transEl.className = '';

  try {
    const [translation, words] = await Promise.all([
      getTranslation(text),
      Promise.resolve(segmentText(text)),
    ]);

    transEl.textContent = translation;
    resultsEl.style.display = 'block';

    // Show skeleton cards immediately
    const entries = words.map(word => {
      const card = makeCard(word, null, true);
      gridEl.appendChild(card);
      return { word, card };
    });

    // Fetch all word data in parallel, update cards as they resolve
    await Promise.allSettled(entries.map(async ({ word, card }) => {
      const info = await lookupWord(word);
      const updated = makeCard(word, info, false);
      gridEl.replaceChild(updated, card);
    }));

  } catch (err) {
    transEl.className = 'error';
    transEl.textContent = 'Error: ' + err.message;
    resultsEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinEl.style.display = 'none';
  }
}

function clearAll() {
  inputEl.value = '';
  resultsEl.style.display = 'none';
  transEl.textContent = '';
  gridEl.innerHTML = '';
  copyBtn.className = '';
  inputEl.focus();
}

function copyTranslation() {
  const text = transEl.textContent;
  if (!text || transEl.classList.contains('error')) return;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.className = ''; }, 2000);
  });
}
</script>

</body>
</html>
