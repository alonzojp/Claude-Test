<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Translator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f14;
      color: #e8e6e1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #fff; }
    header h1 span { color: #e05252; }
    header p { margin-top: 8px; color: #888; font-size: 0.9rem; }

    .panel {
      background: #18181f;
      border: 1px solid #2a2a36;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 780px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      background: #0f0f14;
      border: 1px solid #2a2a36;
      border-radius: 10px;
      color: #e8e6e1;
      font-size: 1.05rem;
      line-height: 1.65;
      padding: 14px 16px;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: #e05252; }
    textarea::placeholder { color: #3a3a4a; }

    .controls { display: flex; align-items: center; gap: 10px; margin-top: 14px; }

    #translateBtn {
      background: #e05252;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 26px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #translateBtn:hover { background: #c94444; }
    #translateBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a36;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #clearBtn:hover { color: #999; border-color: #444; }

    .spinner {
      display: none;
      width: 17px;
      height: 17px;
      border: 2px solid #2a2a36;
      border-top-color: #e05252;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ─────────────────────────────────────────── */
    #results { display: none; width: 100%; max-width: 780px; margin-top: 18px; gap: 16px; flex-direction: column; }

    .result-panel {
      background: #18181f;
      border: 1px solid #2a2a36;
      border-radius: 16px;
      padding: 24px 28px;
    }

    #translationText {
      font-size: 1.08rem;
      line-height: 1.8;
      color: #ddd;
      white-space: pre-wrap;
    }
    #translationText.error { color: #e05252; font-size: 0.9rem; }

    .copy-row { display: flex; justify-content: flex-end; margin-top: 12px; }
    #copyBtn {
      background: transparent;
      color: #555;
      border: 1px solid #2a2a36;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #copyBtn:hover { color: #999; border-color: #444; }
    #copyBtn.copied { color: #5cb85c; border-color: #5cb85c; }

    /* ── Word cards (horizontal, stacked vertically) ─────── */
    #wordList { display: flex; flex-direction: column; gap: 10px; }

    .word-card {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      background: #0f0f14;
      border: 1px solid #23232f;
      border-radius: 12px;
      padding: 16px 20px;
      transition: border-color 0.15s;
    }
    .word-card:hover { border-color: #3a3a52; }
    .word-card.loading { opacity: 0.4; animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.65} }

    .wc-left {
      min-width: 80px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .wc-jp {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .wc-right { flex: 1; min-width: 0; }

    .wc-reading-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }
    .wc-furi { font-size: 0.85rem; color: #e05252; font-weight: 500; }
    .wc-sep  { color: #3a3a52; font-size: 0.8rem; }
    .wc-rom  { font-size: 0.85rem; color: #777; font-style: italic; }

    .jlpt-badge {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .jlpt-n5 { background: #1a3d1a; color: #5cb85c; }
    .jlpt-n4 { background: #1a3038; color: #5bc0de; }
    .jlpt-n3 { background: #1a2a3d; color: #428bca; }
    .jlpt-n2 { background: #2a1a3d; color: #9b59b6; }
    .jlpt-n1 { background: #3d1a1a; color: #e05252; }

    .wc-pos {
      font-size: 0.7rem;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .wc-def {
      font-size: 0.88rem;
      color: #bbb;
      line-height: 1.5;
    }

    .wc-no-info {
      font-size: 0.82rem;
      color: #3a3a52;
      font-style: italic;
    }

    footer { margin-top: 28px; color: #3a3a52; font-size: 0.76rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Japanese <span>Translator</span></h1>
  <p>Paste any Japanese text to translate and break down word by word.</p>
</header>

<div class="panel">
  <div class="section-label">Japanese input</div>
  <textarea id="input" placeholder="日本語のテキストをここに貼り付けてください…" spellcheck="false"></textarea>
  <div class="controls">
    <button id="translateBtn" onclick="doTranslate()">Translate</button>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
    <div class="spinner" id="spinner"></div>
  </div>
</div>

<div id="results">
  <div class="result-panel">
    <div class="section-label">English translation</div>
    <div id="translationText"></div>
    <div class="copy-row">
      <button id="copyBtn" onclick="copyTranslation()">Copy</button>
    </div>
  </div>

  <div class="result-panel">
    <div class="section-label">Word breakdown</div>
    <div id="wordList"></div>
  </div>
</div>

<footer>Translation by MyMemory · Word data by Jisho</footer>

<script>
const inputEl  = document.getElementById('input');
const resultsEl = document.getElementById('results');
const transEl  = document.getElementById('translationText');
const listEl   = document.getElementById('wordList');
const btn      = document.getElementById('translateBtn');
const spinEl   = document.getElementById('spinner');
const copyBtn  = document.getElementById('copyBtn');

inputEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doTranslate();
});

// ── Translation ───────────────────────────────────────────────────────────────

async function getTranslation(text) {
  // Primary: MyMemory (CORS-safe, built for browsers)
  try {
    const res  = await fetch('https://api.mymemory.translated.net/get?q='
      + encodeURIComponent(text) + '&langpair=ja%7Cen');
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData.translatedText)
      return data.responseData.translatedText;
  } catch {}

  // Fallback: Google Translate unofficial endpoint
  const res  = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q='
    + encodeURIComponent(text));
  const data = await res.json();
  const out  = data[0].filter(Boolean).map(c => c[0]).join('');
  if (!out) throw new Error('Translation returned empty result');
  return out;
}

// ── Segmentation ──────────────────────────────────────────────────────────────

function segmentText(text) {
  if ('Segmenter' in Intl) {
    const seg = new Intl.Segmenter('ja', { granularity: 'word' });
    return [...seg.segment(text)].filter(s => s.isWordLike).map(s => s.segment);
  }
  return text.match(/[぀-ヿ㐀-䶿一-鿿ｦ-ﾟ]+/g) || [];
}

// ── Dictionary lookup (Jotoba primary → Jisho proxies fallback) ──────────────

async function lookupJotoba(word) {
  const res = await fetch('https://jotoba.de/api/search/words', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: word, language: 'English', no_english: false }),
    signal: AbortSignal.timeout(6000),
  });
  if (!res.ok) throw new Error('jotoba error');
  const data = await res.json();
  if (!data.words?.length) return null;
  const w = data.words[0];
  const lvl = w.jlpt_lvl; // number 1–5, where 5=N5 (easiest) … 1=N1 (hardest)
  return {
    reading:    w.reading?.kana || null,
    jlpt:       lvl != null ? String(lvl) : null,
    definition: w.senses?.[0]?.glosses?.slice(0, 3).join('; ') || null,
    pos:        w.senses?.[0]?.pos?.slice(0, 2).join(', ')     || null,
  };
}

async function lookupJisho(word) {
  const jishoUrl = 'https://jisho.org/api/v1/search/words?keyword=' + encodeURIComponent(word);
  const proxies  = [
    'https://corsproxy.io/?' + jishoUrl,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(jishoUrl),
  ];
  for (const url of proxies) {
    try {
      const res  = await fetch(url, { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.data?.length) continue;
      const e    = data.data[0];
      const jlpt = e.jlpt?.[0]?.replace('jlpt-n', '') || null; // "jlpt-n3" → "3"
      return {
        reading:    e.japanese?.[0]?.reading || null,
        jlpt,
        definition: e.senses?.[0]?.english_definitions?.slice(0, 3).join('; ') || null,
        pos:        e.senses?.[0]?.parts_of_speech?.slice(0, 2).join(', ')     || null,
      };
    } catch {}
  }
  return null;
}

async function lookupWord(word) {
  try { return await lookupJotoba(word); } catch {}
  try { return await lookupJisho(word);  } catch {}
  return null;
}

// ── Romaji (Hepburn) ──────────────────────────────────────────────────────────

function toRomaji(s) {
  if (!s) return '';
  s = s.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
  const C = {
    'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho',
    'ちゃ':'cha','ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo',
    'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo',
    'りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
    'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo', 'びゃ':'bya','びゅ':'byu','びょ':'byo',
    'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo','ふぁ':'fa', 'ふぃ':'fi', 'ふぇ':'fe','ふぉ':'fo',
  };
  const S = {
    'あ':'a','い':'i','う':'u','え':'e','お':'o',
    'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
    'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
    'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
    'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
    'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
    'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
    'や':'ya','ゆ':'yu','よ':'yo',
    'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
    'わ':'wa','を':'wo','ん':'n',
    'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
    'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
    'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
    'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
    'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
    'ゃ':'ya','ゅ':'yu','ょ':'yo','ー':'-',
  };
  let out = '', i = 0;
  while (i < s.length) {
    if (s[i] === 'っ') {
      const peek = C[s.slice(i+1,i+3)] || S[s[i+1]] || '';
      out += peek[0] || ''; i++; continue;
    }
    const two = s.slice(i, i+2);
    if (C[two])   { out += C[two]; i += 2; }
    else if (S[s[i]]) { out += S[s[i]]; i++; }
    else          { out += s[i]; i++; }
  }
  return out;
}

// ── Card builder ──────────────────────────────────────────────────────────────

function makeCard(word, info, loading) {
  const card = document.createElement('div');
  card.className = 'word-card' + (loading ? ' loading' : '');

  // Left column: Japanese word
  const left = document.createElement('div');
  left.className = 'wc-left';
  const jp = document.createElement('div');
  jp.className = 'wc-jp';
  jp.textContent = word;
  left.appendChild(jp);
  card.appendChild(left);

  // Right column: details
  const right = document.createElement('div');
  right.className = 'wc-right';

  if (info) {
    const reading = info.reading;
    const romaji  = toRomaji(reading);

    // Reading row
    const row = document.createElement('div');
    row.className = 'wc-reading-row';

    if (reading && reading !== word) {
      const f = document.createElement('span');
      f.className = 'wc-furi';
      f.textContent = reading;
      row.appendChild(f);

      const sep = document.createElement('span');
      sep.className = 'wc-sep';
      sep.textContent = '·';
      row.appendChild(sep);
    }

    if (romaji) {
      const r = document.createElement('span');
      r.className = 'wc-rom';
      r.textContent = romaji;
      row.appendChild(r);
    }

    if (info.jlpt) {
      const level = info.jlpt.replace('jlpt-', '');
      const b = document.createElement('span');
      b.className = `jlpt-badge jlpt-${level}`;
      b.textContent = level.toUpperCase();
      row.appendChild(b);
    }

    right.appendChild(row);

    if (info.pos) {
      const p = document.createElement('div');
      p.className = 'wc-pos';
      p.textContent = info.pos;
      right.appendChild(p);
    }

    if (info.definition) {
      const d = document.createElement('div');
      d.className = 'wc-def';
      d.textContent = info.definition;
      right.appendChild(d);
    }
  } else if (!loading) {
    const ni = document.createElement('div');
    ni.className = 'wc-no-info';
    ni.textContent = 'No dictionary entry found';
    right.appendChild(ni);
  }

  card.appendChild(right);
  return card;
}

// ── Main ──────────────────────────────────────────────────────────────────────

async function doTranslate() {
  const text = inputEl.value.trim();
  if (!text) return;

  btn.disabled = true;
  spinEl.style.display = 'block';
  resultsEl.style.display = 'none';
  transEl.textContent = '';
  transEl.className = '';
  listEl.innerHTML = '';

  try {
    const [translation, words] = await Promise.all([
      getTranslation(text),
      Promise.resolve(segmentText(text)),
    ]);

    transEl.textContent = translation;
    resultsEl.style.display = 'flex';

    // Render skeleton cards immediately so the user sees progress
    const entries = words.map(word => {
      const card = makeCard(word, null, true);
      listEl.appendChild(card);
      return { word, card };
    });

    // Fetch all lookups in parallel; update each card as it arrives
    await Promise.allSettled(entries.map(async ({ word, card }) => {
      const info    = await lookupWord(word);
      const updated = makeCard(word, info, false);
      listEl.replaceChild(updated, card);
    }));

  } catch (err) {
    transEl.className = 'error';
    transEl.textContent = 'Error: ' + err.message;
    resultsEl.style.display = 'flex';
  } finally {
    btn.disabled = false;
    spinEl.style.display = 'none';
  }
}

function clearAll() {
  inputEl.value = '';
  resultsEl.style.display = 'none';
  transEl.textContent = '';
  listEl.innerHTML = '';
  copyBtn.className = '';
  inputEl.focus();
}

function copyTranslation() {
  const t = transEl.textContent;
  if (!t || transEl.classList.contains('error')) return;
  navigator.clipboard.writeText(t).then(() => {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.className = ''; }, 2000);
  });
}
</script>

</body>
</html>
